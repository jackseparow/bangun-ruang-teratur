<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksplorasi Bangun Ruang Teratur</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="maskot-siyo.png" alt="Si Yo" class="maskot">
            <div class="title-area">
                <h1>Eksplorasi Bangun Ruang Teratur</h1>
                <p class="instruction">Tarik blok "Bangun" ke dalam blok "Transformasi", lalu klik tombol di bawah.</p>
                <button id="runBtn">Update Visualisasi 3D</button>
            </div>
        </div>
    </header>
    
    <div id="app-container">
        <div id="blocklyDiv"></div>
        <div id="visualization">
            <div id="canvas-caption">Tampilan Statis 3D</div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Bangun Dasar" colour="#5b67a5">
            <block type="base_shape"></block>
        </category>
        <category name="Transformasi" colour="#995ba5">
            <block type="truncate_shape"></block>
            <block type="rectify_shape"></block>
        </category>
    </xml>

    <script src="blocks.js"></script>
    <script src="script.js"></script>
</body>
</html>
